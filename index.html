<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=Montserrat:wght@500;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css" />

  <title>Luxury Perfume Card</title>
</head>
<body>

  <main class="card">
    <img
      src="./images/image-product-desktop.jpg"
      alt="Gabrielle Essence Eau De Parfum"
      class="card-image"
    />

    <section class="card-content">
      <span class="category">Luxury Perfume</span>

      <h1 class="product-name">
        Gabrielle Essence Eau De Parfum
      </h1>

      <p class="description">
        Delicate floral notes combined with a modern and elegant character.
        Created for people who appreciate timeless fragrances.
      </p>

      <div class="price-container">
        <span class="price-current">$149.99</span>
        <span class="price-original">$169.99</span>
      </div>

      <button class="button">
        <img
          src="./images/icon-cart.svg"
          alt=""
          aria-hidden="true"
          width="16"
          height="16"
        />
        Add to Cart
      </button>
    </section>
  </main>

</body>
</html>
